<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie List 2</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="2.css">
</head>

<body>

<!-- Loader -->
<div class="loader-container" id="loader-container">
    <div class="loader"></div>
</div>

<div class="container mt-4">

    <h3>
        Movie List 2
        
    </h3>

    <hr>
    <ul class="breadcrumb">
        <li class="breadcrumb-item"><a href="api_movie_list.html">Movie List 1</a></li>
        <li class="breadcrumb-item active">Movie List 2</li>
        <li class="breadcrumb-item"><a href="api_movie_list3.html">Movie List 3</a></li>
    </ul>

 
    <div class="input-group mb-3 input-group-lg">
        <input type="text" id="txtSearch" class="form-control" placeholder="Search movie...">
        <button class="btn btn-primary" onclick="searchMovies()">Search</button>
    </div>

    <!-- Table -->
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>No</th>
                <th>Movie Name</th>
                <th>Type</th>
                <th>Image</th>
                <th>Air Date</th>
                <th>Time</th>
                <th>Rating</th>
            </tr>
        </thead>

        <tbody id="tableBody"></tbody>
    </table>

</div>

<script src="2.js"></script>

</body>
</html>
