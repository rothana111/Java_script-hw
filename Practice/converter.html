<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to Speech Converter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/Homework/btn.css">
</head>
<body>
    <div class="container">
        <div class="app-container">
            <div class="headings-container">
                <h1>Convert your text into speech</h1>
                <h3>Enter Text and Convert into Speech</h3>
            </div>

            <div class="interaction-container">
                <textarea id="textToConvert"
                    placeholder="Enter text here..."
                    cols="35" rows="10" 
                    class="text-control"></textarea>

                <p class="error-para"></p>
                <button class="btn" id="convertBtn">
                    Play Converted Sound
                </button>
            <div>
        </div>
    </div>

    <a href="../index.html" class="back-btn">← Back</a>

    <script src="script.js"></script>
</body>
</html>
